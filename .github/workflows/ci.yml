name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (syntax check)
        run: |
          python -m py_compile insult/__init__.py
          python -m py_compile insult/__main__.py
          python -m py_compile insult/app.py
          python -m py_compile insult/bot.py
          python -m py_compile insult/config.py
          python -m py_compile insult/core/__init__.py
          python -m py_compile insult/core/character.py
          python -m py_compile insult/core/errors.py
          python -m py_compile insult/core/llm.py
          python -m py_compile insult/core/memory.py
          python -m py_compile insult/core/style.py
          python -m py_compile insult/cogs/__init__.py
          python -m py_compile insult/cogs/chat.py
          python -m py_compile insult/cogs/utility.py

      - name: Run tests
        run: pytest -v --tb=short
