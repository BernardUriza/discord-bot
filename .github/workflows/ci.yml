name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --- Layer 1: Lint & Format (fastest, runs first) ---
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install ruff
        run: pip install ruff==0.11.12

      - name: Ruff lint
        run: ruff check --output-format=github .

      - name: Ruff format check
        run: ruff format --check .

  # --- Layer 2: Unit Tests + Coverage ---
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest -v --tb=short --cov --cov-report=term-missing:skip-covered

  # --- Layer 3: Security — Dependency Audit ---
  security-deps:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pip-audit
        # CVE-2026-3219 (GHSA-58qw-9mgm-455v): pip <= 26.0.1 treats concatenated
        # tar+ZIP archives as ZIP regardless of filename. MEDIUM (CVSS 4.6).
        # Disclosed 2026-04-20. GitHub Advisory API reports patched_versions=None
        # as of 2026-04-26 — no upstream fix released. Threat model requires pip
        # to install a maliciously-crafted ambiguous archive; CI only installs
        # declared deps from PyPI, so the CVE isn't exploitable here.
        # TODO: revisit 2026-05-15 — drop --ignore-vuln when pip publishes patch.
        run: pip-audit --ignore-vuln CVE-2026-3219

  # --- Layer 4: Security — Static Code Analysis ---
  security-code:
    name: Code Security (bandit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install bandit
        run: pip install bandit>=1.8.0

      - name: Run bandit
        run: bandit -r insult/ -c pyproject.toml
